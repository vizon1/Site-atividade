<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRA | Vestuário Minimalista</title>
    <meta name="description" content="Loja virtual ASTRA. Roupas minimalistas com design premium e alta qualidade.">
    <style>
        /* Variáveis de cor e estilo */
        :root {
            --bg-color: #fbfbfd;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #000000;
            --border-color: #d2d2d7;
        }

        /* Reset e tipografia base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* Cabeçalho de navegação */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(251, 251, 253, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--accent-color);
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--text-secondary);
        }
